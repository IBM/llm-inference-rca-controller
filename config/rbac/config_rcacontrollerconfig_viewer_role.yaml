# This rule is not used by the project rca-controller itself.
# It is provided to allow the cluster admin to help manage permissions for users.
#
# Grants read-only access to autoscaling.x-llmd.ai resources.
# This role is intended for users who need visibility into these resources
# without permissions to modify them. It is ideal for monitoring purposes and limited-access viewing.

apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  labels:
    app.kubernetes.io/name: rca-controller
    app.kubernetes.io/managed-by: kustomize
  name: config-rcacontrollerconfig-viewer-role
rules:
- apiGroups:
  - autoscaling.x-llmd.ai
  resources:
  - rcacontrollerconfigs
  verbs:
  - get
  - list
  - watch
- apiGroups:
  - autoscaling.x-llmd.ai
  resources:
  - rcacontrollerconfigs/status
  verbs:
  - get
